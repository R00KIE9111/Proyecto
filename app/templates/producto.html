{% extends "base.html" %}
{% block title %}Producto{% endblock %}
{% block content %}
<h2>{% if producto %}Editar Producto{% else %}Nuevo Producto{% endif %}</h2>

<form method="POST" action="{% if producto %}{{ url_for('editar_producto_route', producto_id=producto.productoId) }}{% else %}{{ url_for('nuevo_producto_route') }}{% endif %}">
    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" name="nombre" value="{{ producto.nombre if producto else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="descripcion" class="form-label">Descripción</label>
        <textarea class="form-control" id="descripcion" name="descripcion">{{ producto.descripcion if producto else '' }}</textarea>
    </div>
    <div class="mb-3">
        <label for="precio" class="form-label">Precio</label>
        <input type="number" step="0.01" class="form-control" id="precio" name="precio" value="{{ producto.precio if producto else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="stock" class="form-label">Stock</label>
        <input type="number" class="form-control" id="stock" name="stock" value="{{ producto.stock if producto else '' }}" required>
    </div>
    <button type="submit" class="btn btn-success">
        {% if producto %}Guardar cambios{% else %}Crear producto{% endif %}
    </button>
</form>
{% endblock %}
