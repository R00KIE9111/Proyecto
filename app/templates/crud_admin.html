{% extends "base.html" %}
{% block title %}Gestión de Productos{% endblock %}
{% block content %}
    <h2>Gestión de Productos</h2>
    <a href="{{ url_for('nuevo_producto') }}" class="btn btn-success mb-3">Agregar Producto</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for producto in productos %}
            <tr>
                <td>{{ producto.nombre }}</td>
                <td>${{ producto.precio }}</td>
                <td>
                    <a href="{{ url_for('detalle_producto', producto_id=producto.productoId) }}" class="btn btn-info btn-sm">Ver</a>
                    <a href="{{ url_for('editar_producto', producto_id=producto.productoId) }}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{{ url_for('eliminar_producto', producto_id=producto.productoId) }}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
                <td>
                    <a href="{{ url_for('editar_producto_route', productoId=producto.productoId) }}" class="btn btn-warning btn-sm">Editar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
