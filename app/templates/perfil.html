{% extends "base.html" %}
{% block title %}Perfil{% endblock %}
{% block content %}
    <h2>Perfil de Usuario</h2>
    <p><strong>Nombre:</strong> {{ nombre }}</p>
    <p><strong>Rol:</strong> {{ rol }}</p>
    <div class="mt-3">
        <a href="{{ url_for('productos') }}" class="btn btn-primary">Ver productos</a>

{% endblock %}
