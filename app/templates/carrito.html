{% extends "base.html" %}
{% block title %}Carrito{% endblock %}
{% block content %}
<h2>Carrito de Compras</h2>
<table class="table">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.nombre }}</td>
            <td>{{ item.precio }}</td>
            <td>{{ item.cantidad }}</td>
            <td>{{ item.subtotal }}</td>
            <td>
                <form method="POST" action="{{ url_for('eliminar_carrito', productoId=item.productoId) }}">
                    <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                </form>
            </td>
            <td>
                <form method="POST" action="{{ url_for('comprar') }}">
                 <button type="submit" class="btn btn-success">Finalizar Compra</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<p><strong>Total:</strong> {{ total }}</p>
{% endblock %}
