{% extends "base.html" %}
{% block title %}Carrito{% endblock %}
{% block content %}
    <h2>Tu carrito de compras</h2>
    <ul class="list-group">
        {% for item in items %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ item.nombre }}
                <span class="badge bg-primary">${{ item.precio }}</span>
                <span class="badge bg-secondary">x{{ item.cantidad }}</span>
            </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('pedido_crear') }}" class="btn btn-success mt-3">Finalizar compra</a>
{% endblock %}
